<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Wheel of Life</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f9f9f9;
            padding: 20px;
        }
        h1 { color: #333; }
        .container {
            position: relative;
            margin-bottom: 20px;
        }
        canvas {
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            /* Prevent touch actions like scrolling while touching the canvas */
            touch-action: none; 
        }
        .stats {
            font-size: 1.5rem;
            font-weight: bold;
            color: #444;
            margin-top: 10px;
        }
        .controls {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            max-width: 600px;
            width: 100%;
        }
        .control-group {
            background: white;
            padding: 10px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        input[type="range"] {
            width: 100px;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
        }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h1>Interactive Wheel of Life</h1>
    <p>Click on the wheel or use the sliders to rate each area.</p>

    <div class="container">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
    </div>

    <div class="stats">
        Average Score: <span id="averageScore">0.0</span> / 10
    </div>

    <button onclick="resetWheel()">Reset Chart</button>

    <div class="controls" id="controlsArea"></div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const avgDisplay = document.getElementById('averageScore');
        const controlsArea = document.getElementById('controlsArea');

        // Configuration matching your image colors (approximate pastel rainbow)
        const categories = [
            "Category 1", "Category 2", "Category 3", "Category 4", "Category 5",
            "Category 6", "Category 7", "Category 8", "Category 9", "Category 10"
        ];
        
        // Colors matching the segments in your image (clockwise starting from top-rightish)
        const segmentColors = [
            '#ffcccc', // Red/Pink
            '#ffe5cc', // Orange
            '#ffffcc', // Yellow
            '#e5ffcc', // Light Green
            '#ccffcc', // Green
            '#ccffe5', // Mint
            '#ccffff', // Cyan
            '#cce5ff', // Light Blue
            '#ccccff', // Lavender
            '#e5ccff'  // Purple
        ];

        // State
        let scores = new Array(10).fill(0); // Start all at 0
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        const radius = 280; // slightly smaller than half width to leave padding
        const maxScore = 10;

        // Initialize
        function init() {
            createControls();
            draw();
            addEventListeners();
        }

        // Create Slider Controls
        function createControls() {
            controlsArea.innerHTML = '';
            categories.forEach((cat, index) => {
                const div = document.createElement('div');
                div.className = 'control-group';
                div.innerHTML = `
                    <label style="color:${'#555'}">${cat}</label>
                    <span id="val-${index}">0</span>
                    <input type="range" min="0" max="10" value="0" step="1" 
                           oninput="updateScore(${index}, this.value)">
                `;
                controlsArea.appendChild(div);
            });
        }

        // Update Score from Slider
        window.updateScore = function(index, value) {
            scores[index] = parseInt(value);
            document.getElementById(`val-${index}`).innerText = value;
            draw();
            updateAverage();
        }

        // Calculate Average
        function updateAverage() {
            const sum = scores.reduce((a, b) => a + b, 0);
            const avg = (sum / scores.length).toFixed(1);
            avgDisplay.innerText = avg;
        }

        // Reset
        window.resetWheel = function() {
            scores.fill(0);
            categories.forEach((_, i) => {
                document.getElementById(`val-${i}`).innerText = '0';
                document.querySelector(`input[oninput="updateScore(${i}, this.value)"]`).value = 0;
            });
            draw();
            updateAverage();
        }

        // --- DRAWING LOGIC ---

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Rotate so index 0 is at the top-right (standard chart orientation)
            // 10 segments = 36 degrees each.
            // We want the vertical line to be a separator. 
            // So we start drawing at -90 degrees (12 o'clock).
            const angleStep = (2 * Math.PI) / categories.length;
            const startAngleOffset = -Math.PI / 2; 

            // 1. Draw Background Segments (The full color wedges)
            for (let i = 0; i < categories.length; i++) {
                const startAngle = i * angleStep + startAngleOffset;
                const endAngle = (i + 1) * angleStep + startAngleOffset;

                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = segmentColors[i];
                ctx.fill();
                ctx.stroke();
            }

            // 2. Draw The Rating (The Filled Area)
            // We draw a darker overlay or simply stroke the arc at the level of the score
            for (let i = 0; i < categories.length; i++) {
                if(scores[i] > 0) {
                    const startAngle = i * angleStep + startAngleOffset;
                    const endAngle = (i + 1) * angleStep + startAngleOffset;
                    // Calculate radius based on score (score 10 = full radius)
                    const scoreRadius = (scores[i] / maxScore) * radius;

                    ctx.beginPath();
                    ctx.moveTo(centerX, centerY);
                    ctx.arc(centerX, centerY, scoreRadius, startAngle, endAngle);
                    ctx.closePath();
                    // Make it slightly darker/more opaque version of the color
                    ctx.fillStyle = 'rgba(0,0,0,0.2)'; // Add a shadow to mark the level
                    ctx.fill();
                    
                    // Draw a strong line at the score level
                    ctx.beginPath();
                    ctx.arc(centerX, centerY, scoreRadius, startAngle, endAngle);
                    ctx.strokeStyle = '#333';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                    ctx.lineWidth = 1; // Reset
                }
            }

            // 3. Draw Concentric Grid Lines (1-10)
            ctx.strokeStyle = '#999';
            ctx.setLineDash([2, 4]); // Dashed lines like your image
            for (let s = 1; s <= maxScore; s++) {
                ctx.beginPath();
                const r = (s / maxScore) * radius;
                ctx.arc(centerX, centerY, r, 0, 2 * Math.PI);
                ctx.stroke();
            }
            ctx.setLineDash([]); // Reset dash

            // 4. Draw Sector Dividers (Spokes)
            ctx.strokeStyle = '#666';
            for (let i = 0; i < categories.length; i++) {
                const angle = i * angleStep + startAngleOffset;
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.lineTo(centerX + Math.cos(angle) * radius, centerY + Math.sin(angle) * radius);
                ctx.stroke();
            }
        }

        // --- INTERACTION LOGIC ---

        function addEventListeners() {
            // Mouse Click
            canvas.addEventListener('mousedown', handleInput);
            // Touch (for mobile)
            canvas.addEventListener('touchstart', (e) => {
                e.preventDefault(); // prevent scroll
                handleInput(e.touches[0]);
            });
        }

        function handleInput(e) {
            const rect = canvas.getBoundingClientRect();
            // Get X and Y relative to the center of the wheel
            const x = e.clientX - rect.left - centerX;
            const y = e.clientY - rect.top - centerY;

            // Calculate distance (Radius)
            const dist = Math.sqrt(x*x + y*y);
            
            // If click is outside the wheel, ignore
            if (dist > radius) return;

            // Calculate Score based on distance
            let score = Math.ceil((dist / radius) * 10);
            if (score < 1) score = 1; 

            // Calculate Angle to find which Segment
            // atan2 returns -PI to PI. We need to normalize it to 0 to 2PI
            let angle = Math.atan2(y, x);
            
            // Adjust for our start offset (-90deg or -PI/2)
            // We rotated the drawing by -PI/2, so we must add PI/2 to the mouse angle to match
            angle += Math.PI / 2;

            // Normalize negative angles (0 to 2PI)
            if (angle < 0) angle += 2 * Math.PI;

            const angleStep = (2 * Math.PI) / categories.length;
            let segmentIndex = Math.floor(angle / angleStep);

            // Edge case: ensure index is within bounds (0-9)
            segmentIndex = segmentIndex % 10;

            // Update Data
            updateScore(segmentIndex, score);
            // Update Slider UI to match click
            document.querySelector(`input[oninput="updateScore(${segmentIndex}, this.value)"]`).value = score;
        }

        // Start
        init();

    </script>
</body>
</html>
